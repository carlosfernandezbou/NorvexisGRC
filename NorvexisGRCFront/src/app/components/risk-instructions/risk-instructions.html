<div class="catalog-panel">
  <div class="table-wrapper">
    <table class="styled-table">
      <thead>
        <tr>
          <th>Field</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of instructions">
          <td class="fw-bold">{{ item.title }}</td>
          <td>{{ item.description }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
