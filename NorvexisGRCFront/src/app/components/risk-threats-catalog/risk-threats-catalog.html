<div class="catalog-panel">
  <div class="table-wrapper">
    <table class="styled-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Threat</th>
          <th>Core value directly impacted</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of threatsCatalog; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ item.threat }}</td>
          <td>{{ getImpactText(item.impacts) }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
