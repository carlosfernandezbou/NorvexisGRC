<div *ngIf="loading" class="empty-state">
  Loading risk categories...
</div>

<div *ngIf="error" class="error-state">
  {{ error }}
</div>

<div *ngIf="!loading && !error" class="catalog-panel">
  <div class="risk-grid">
    <div class="card-block">
      <h3>Impact</h3>
      <div class="table-wrapper">
        <table class="styled-table">
          <thead>
            <tr>
              <th>Impact</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of riskCategories?.impactLevels">
              <td>{{ item.level }} - {{ item.name }}</td>
              <td>{{ item.description }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card-block">
      <h3>Likelihood</h3>
      <div class="table-wrapper">
        <table class="styled-table">
          <thead>
            <tr>
              <th>Likelihood</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of riskCategories?.likelihoodLevels">
              <td>{{ item.level }} - {{ item.name }}</td>
              <td>{{ item.description }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card-block matrix-block">
    <h3>Risk Categories Matrix</h3>
    <img
      src="/data/RiskManagement/RiskMatrix.png"
      alt="Risk Categories Matrix"
      class="matrix-image"
    />
  </div>
</div>
