<nav class="navbar">
  <div class="logo">
    <img src="logo.png" alt="Logo" routerLink="/home" (click)="closeAllMenus()">
    <span>NorvexisGRC</span>
  </div>

  <button class="mobile-menu-btn" type="button" (click)="toggleMobileMenu()">
    ☰
  </button>

  <ul class="menu" [class.menu-open]="mobileMenuOpen">
    <li>
      <a routerLink="/home" (click)="closeAllMenus()">Home</a>
    </li>

    <li>
      <a routerLink="/isms" (click)="closeAllMenus()">KPIs</a>
    </li>

    <li>
      <a routerLink="/soa" (click)="closeAllMenus()">SOA</a>
    </li>

    <li class="risk-menu-wrapper">
      <button type="button" class="risk-menu-btn" (click)="toggleRiskMenu($event)">
        Risk Management
      </button>

      <div class="risk-dropdown" *ngIf="riskMenuOpen">
        <button
          class="risk-dropdown-item"
          [routerLink]="'/risk-management'"
          [queryParams]="{ section: 'Instructions' }"
          (click)="closeAllMenus()">
          Instructions
        </button>

        <button
          class="risk-dropdown-item"
          [routerLink]="['/risk-management']"
          [queryParams]="{ section: 'Risk register' }"
          (click)="closeAllMenus()">
          Risk register
        </button>

        <button
          class="risk-dropdown-item"
          [routerLink]="'/risk-management'"
          [queryParams]="{ section: 'Threats catalog' }"
          (click)="closeAllMenus()">
          Threats catalog
        </button>

        <button
          class="risk-dropdown-item"
          [routerLink]="'/risk-management'"
          [queryParams]="{ section: 'Risk categorization' }"
          (click)="closeAllMenus()">
          Risk categorization
        </button>

        <button
          class="risk-dropdown-item"
          [routerLink]="'/risk-management'"
          [queryParams]="{ section: 'Other catalogs' }"
          (click)="closeAllMenus()">
          Other catalogs
        </button>
      </div>
    </li>

    <li>
      <button class="logout-btn" type="button" (click)="logout()" title="Logout">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          width="18"
          height="18">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </button>
    </li>
  </ul>
</nav>
